<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Primary SEO -->
    <title>BINLOOP 120K | Official Trail Running Event</title>

    <meta
      name="description"
      content="Join BINLOOP 120K, Indonesia's premier ultra trail running event. Experience breathtaking routes, challenging elevations, and an unforgettable race adventure."
    />

    <meta
      name="keywords"
      content="BINLOOP 120K, Trail Run, Ultra Marathon, Running Event, Indonesia, Binloop, Ultra Trail, Race"
    />

    <meta name="author" content="BINLOOP" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- Canonical -->
    <link rel="canonical" href="https://binloop120k.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/new/binloopLogo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/new/binloopLogo.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BINLOOP 120K" />
    <meta property="og:title" content="BINLOOP 120K | Official Trail Running Event" />

    <meta
      property="og:description"
      content="Experience one of Indonesia's most exciting ultra trail running events. Register now for BINLOOP 120K."
    />

    <meta property="og:url" content="https://binloop120k.com/" />

    <!-- Replace this with a proper banner image -->
    <meta
      property="og:image"
      content="https://binloop120k.com/images/og-image.jpg"
    />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="BINLOOP 120K | Official Trail Running Event"
    />

    <meta
      name="twitter:description"
      content="Join BINLOOP 120K, Indonesia's premier ultra trail running event."
    />

    <meta
      name="twitter:image"
      content="https://binloop120k.com/images/og-image.jpg"
    />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
